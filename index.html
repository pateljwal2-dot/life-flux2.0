<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeFlux Web — Biosync V4.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=JetBrains+Mono:wght@500&display=swap');

        :root {
            --bg-light: #F8FAFC;
            --bg-dark: #0F172A;
            --accent: #06B6D4;
        }

        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        .font-mono { font-family: 'JetBrains Mono', monospace; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .page {
            display: none;
            animation: fadeIn 0.4s ease-out forwards;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .protocol-card:active { transform: scale(0.98); }
        
        #modal-overlay {
            display: none;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
        }
        
        #modal-overlay.active {
            display: flex;
        }
    </style>
</head>
<body class="bg-[#F8FAFC] text-[#1E293B] transition-colors duration-500 pb-32">

    <!-- MODAL SYSTEM -->
    <div id="modal-overlay" class="fixed inset-0 z-[100] items-center justify-center p-4">
        <div id="modal-content" class="bg-white rounded-[2.5rem] w-full max-w-md p-8 shadow-2xl border border-[#E2E8F0] dark:bg-[#1E293B] dark:border-slate-700">
            <!-- Content injected via JS -->
        </div>
    </div>

    <!-- HEADER -->
    <header class="max-w-6xl mx-auto px-6 pt-12 pb-8 flex justify-between items-start">
        <div class="cursor-pointer" onclick="navigateTo('DASHBOARD')">
            <h1 class="text-2xl font-black tracking-tighter dark:text-white">LIFE<span class="text-[#64748B] dark:text-slate-400">FLUX</span></h1>
            <p class="text-[10px] font-medium tracking-[0.2em] mt-1 text-[#94A3B8] dark:text-slate-500 uppercase">BIOSYNC V4.1 — <span id="header-day" class="text-[#1E293B] dark:text-slate-300">MONDAY</span></p>
        </div>
        <div class="flex items-center gap-4">
            <div class="px-4 py-2 rounded-2xl border bg-white border-slate-200 flex items-center gap-2 dark:bg-slate-800 dark:border-slate-700">
                <div id="user-avatar-small" class="w-8 h-8 rounded-lg overflow-hidden bg-slate-100 flex items-center justify-center text-[10px] font-black">U</div>
                <span id="user-name-small" class="text-[10px] font-semibold uppercase tracking-widest truncate max-w-[80px]">User Alpha</span>
            </div>
            <button onclick="toggleDarkMode()" class="p-3 rounded-2xl transition-all border bg-white border-slate-200 text-slate-400 dark:bg-slate-800 dark:border-slate-700 dark:text-yellow-400">
                <i data-lucide="moon" id="theme-icon"></i>
            </button>
            <p id="clock" class="text-2xl font-mono font-medium tracking-tighter hidden sm:block dark:text-slate-200">12:00 pm</p>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 space-y-8">
        
        <!-- PAGE: DASHBOARD -->
        <div id="DASHBOARD" class="page active">
            <div class="flex items-center gap-3 mb-8">
                <div class="p-2 rounded-xl bg-cyan-500/10 text-cyan-500"><i data-lucide="sparkles" size="20"></i></div>
                <h2 class="text-2xl font-semibold tracking-tight dark:text-white">Hi, <span id="user-greeting">User</span></h2>
            </div>

            <!-- Day Selector -->
            <div class="flex gap-2 overflow-x-auto pb-4 no-scrollbar mb-8" id="day-selector"></div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <section class="md:col-span-2 rounded-[2rem] border p-8 shadow-sm flex items-center justify-between bg-white border-[#E2E8F0] dark:bg-slate-800 dark:border-slate-700">
                    <div class="flex-1">
                        <h2 class="text-[11px] font-medium uppercase tracking-[0.2em] text-[#94A3B8] mb-4">Efficiency Rating</h2>
                        <span id="efficiency-value" class="text-5xl font-black tracking-tighter dark:text-white">0%</span>
                        <div class="h-2 w-full mt-6 rounded-full overflow-hidden bg-slate-100 dark:bg-slate-700">
                            <div id="efficiency-bar" class="h-full bg-cyan-500 transition-all duration-1000" style="width: 0%"></div>
                        </div>
                    </div>
                </section>
                
                <section class="rounded-[2rem] border p-8 bg-white border-[#E2E8F0] dark:bg-slate-800 dark:border-slate-700">
                   <div class="flex justify-between items-center mb-4">
                     <h3 id="blueprint-title" class="text-[11px] font-medium uppercase tracking-widest text-[#94A3B8]">Today's Blueprint</h3>
                     <button onclick="openModal('edit_blueprint', state.selectedDay)" class="p-1 hover:text-cyan-500 transition-colors"><i data-lucide="edit-3" size="14"></i></button>
                   </div>
                   <div class="space-y-3" id="mini-meal-plan"></div>
                </section>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <section class="rounded-[2.5rem] border p-8 bg-white border-[#E2E8F0] dark:bg-slate-800 dark:border-slate-700">
                    <div class="flex items-center justify-between mb-8">
                        <h3 class="text-[11px] font-medium uppercase tracking-widest text-[#94A3B8]">Flux Timeline</h3>
                        <button onclick="openModal('add_task')" class="p-2 rounded-xl bg-slate-100 text-slate-600 hover:bg-slate-200 dark:bg-slate-700 dark:text-slate-300"><i data-lucide="plus" size="18"></i></button>
                    </div>
                    <div class="space-y-6" id="timeline-list"></div>
                </section>

                <section class="rounded-[2.5rem] border p-8 bg-white border-[#E2E8F0] dark:bg-slate-800 dark:border-slate-700">
                    <div class="flex items-center justify-between mb-8">
                        <h3 class="text-[11px] font-medium uppercase tracking-widest text-[#94A3B8]">Recharge Protocols</h3>
                        <button onclick="openModal('add_protocol')" class="p-2 rounded-xl bg-slate-100 text-slate-600 hover:bg-slate-200 dark:bg-slate-700 dark:text-slate-300"><i data-lucide="plus" size="18"></i></button>
                    </div>
                    <div class="grid grid-cols-2 gap-4" id="protocol-grid"></div>
                </section>
            </div>
        </div>

        <!-- PAGE: WEEKLY -->
        <div id="WEEKLY_ARCHITECTURE" class="page">
            <div class="flex items-center gap-4 mb-8">
                <button onclick="navigateTo('DASHBOARD')" class="p-3 border rounded-2xl bg-white border-[#E2E8F0] dark:bg-slate-800 dark:border-slate-700 dark:text-white"><i data-lucide="chevron-left" size="20"></i></button>
                <h2 class="text-xl font-semibold dark:text-white">Weekly Blueprint</h2>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="full-weekly-grid"></div>
        </div>

        <!-- PAGE: HISTORY -->
        <div id="HISTORY" class="page max-w-3xl mx-auto">
            <div class="flex items-center gap-4 mb-8">
                <button onclick="navigateTo('DASHBOARD')" class="p-3 border rounded-2xl bg-white border-[#E2E8F0] dark:bg-slate-800 dark:border-slate-700 dark:text-white"><i data-lucide="chevron-left" size="20"></i></button>
                <h2 class="text-xl font-semibold dark:text-white">Lifecycle History</h2>
            </div>
            <div class="space-y-4" id="history-list"></div>
        </div>

        <!-- PAGE: PROFILE -->
        <div id="PROFILE" class="page max-w-4xl mx-auto">
            <div class="flex items-center justify-between mb-8">
                <div class="flex items-center gap-4">
                    <button onclick="navigateTo('DASHBOARD')" class="p-3 border rounded-2xl bg-white border-[#E2E8F0] dark:bg-slate-800 dark:border-slate-700 dark:text-white"><i data-lucide="chevron-left" size="20"></i></button>
                    <h2 class="text-xl font-semibold dark:text-white">Architecture Settings</h2>
                </div>
                <button onclick="openModal('add_profile')" class="px-6 py-3 rounded-2xl bg-cyan-500 text-white font-semibold text-[10px] uppercase tracking-widest flex items-center gap-2 shadow-lg shadow-cyan-500/20"><i data-lucide="user-plus" size="16"></i> New Architecture</button>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-1 space-y-4">
                    <h3 class="text-[11px] font-medium text-[#94A3B8] uppercase tracking-widest px-4">Managed Architectures</h3>
                    <div id="profile-selector-list" class="space-y-3"></div>
                </div>

                <div class="lg:col-span-2 rounded-[2.5rem] border p-10 bg-white border-[#E2E8F0] dark:bg-slate-800 dark:border-slate-700 relative">
                    <button onclick="openModal('edit_profile')" class="absolute top-8 right-8 p-3 rounded-2xl bg-slate-100 text-slate-600 hover:bg-slate-200 dark:bg-slate-700 dark:text-slate-300"><i data-lucide="pencil" size="14"></i></button>
                    <div class="text-center">
                        <div class="relative inline-block">
                            <div id="profile-avatar-large" class="w-32 h-32 rounded-[2.5rem] overflow-hidden bg-slate-100 mx-auto mb-4 flex items-center justify-center text-slate-400 font-black text-4xl border-4 border-white shadow-xl dark:border-slate-900 dark:bg-slate-900">U</div>
                            <input type="file" id="avatar-input" class="hidden" accept="image/*" onchange="handleAvatarUpload(event)">
                            <button onclick="document.getElementById('avatar-input').click()" class="absolute bottom-2 right-0 p-3 rounded-2xl bg-cyan-500 text-white shadow-lg"><i data-lucide="camera" size="18"></i></button>
                        </div>
                        <h3 id="profile-name-large" class="text-3xl font-semibold dark:text-white">User Alpha</h3>
                        <div class="mt-6 flex flex-wrap justify-center gap-4" id="age-stats"></div>
                    </div>
                    <div class="pt-8 mt-8 border-t border-dashed border-slate-200 dark:border-slate-700">
                        <button onclick="openModal('factory_reset')" class="w-full py-5 rounded-2xl border-2 border-dashed border-red-200 text-red-500 font-semibold text-[11px] uppercase tracking-widest hover:bg-red-50 dark:hover:bg-red-500/10">Factory Reset Architecture</button>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <!-- NAVIGATION BAR -->
    <nav class="fixed bottom-10 left-1/2 -translate-x-1/2 w-[90%] max-w-md z-[60]">
        <div id="quick-menu" class="hidden absolute bottom-24 left-1/2 -translate-x-1/2 w-48 space-y-2">
            <button onclick="openModal('add_protocol')" class="w-full p-4 rounded-2xl border bg-white border-slate-200 text-slate-800 flex items-center gap-3 shadow-xl dark:bg-slate-800 dark:border-slate-700 dark:text-white">
                <div class="w-8 h-8 rounded-lg bg-cyan-500/10 text-cyan-500 flex items-center justify-center"><i data-lucide="activity" size="18"></i></div>
                <span class="text-[10px] font-semibold uppercase tracking-widest">Protocol</span>
            </button>
            <button onclick="openModal('add_task')" class="w-full p-4 rounded-2xl border bg-white border-slate-200 text-slate-800 flex items-center gap-3 shadow-xl dark:bg-slate-800 dark:border-slate-700 dark:text-white">
                <div class="w-8 h-8 rounded-lg bg-indigo-500/10 text-indigo-500 flex items-center justify-center"><i data-lucide="clipboard-list" size="18"></i></div>
                <span class="text-[10px] font-semibold uppercase tracking-widest">Objective</span>
            </button>
        </div>

        <div class="border rounded-3xl shadow-xl p-2 flex items-center justify-around backdrop-blur-xl bg-white/80 border-slate-200 dark:bg-slate-800/80 dark:border-slate-700">
            <button onclick="navigateTo('DASHBOARD')" class="nav-btn p-4 rounded-2xl text-slate-400" id="nav-DASHBOARD"><i data-lucide="zap" size="22"></i></button>
            <button onclick="navigateTo('HISTORY')" class="nav-btn p-4 rounded-2xl text-slate-400" id="nav-HISTORY"><i data-lucide="history" size="22"></i></button>
            <button onclick="toggleQuickMenu()" id="plus-btn" class="w-14 h-14 rounded-full flex items-center justify-center shadow-lg bg-slate-900 text-white transform transition active:scale-95"><i data-lucide="plus" size="28"></i></button>
            <button onclick="navigateTo('WEEKLY_ARCHITECTURE')" class="nav-btn p-4 rounded-2xl text-slate-400" id="nav-WEEKLY_ARCHITECTURE"><i data-lucide="layout" size="22"></i></button>
            <button onclick="navigateTo('PROFILE')" class="nav-btn p-4 rounded-2xl text-slate-400" id="nav-PROFILE"><i data-lucide="user" size="22"></i></button>
        </div>
    </nav>

    <script>
        const days = ["SUNDAY", "MONDAY", "TUESDAY", "WEDNESDAY", "THURSDAY", "FRIDAY", "SATURDAY"];
        let state = {
            isDarkMode: false,
            currentView: 'DASHBOARD',
            selectedDay: days[new Date().getDay()],
            lastResetDate: new Date().toDateString(),
            completedIds: new Set(),
            activeProfileId: 'default',
            profiles: [{ id: 'default', name: "User Alpha", birthdate: "2000-01-01", avatar: null }],
            history: [],
            rechargeData: [
                { id: 'hydration', label: 'HYDRATION', current: 0, total: 8, time: '08:00 AM' },
                { id: 'meditation', label: 'MEDITATION', current: 0, total: 1, time: '07:00 AM' },
                { id: 'reading', label: 'READING', current: 0, total: 1, time: '09:00 PM' }
            ],
            fluxTasks: [],
            weeklyPlan: {}
        };

        days.forEach(day => {
            state.weeklyPlan[day] = {
                BREAKFAST: 'Nutrient Shake', LUNCH: 'Power Salad', DINNER: 'Lean Protein',
                B_TIME: '08:00 AM', L_TIME: '01:00 PM', D_TIME: '07:00 PM'
            };
        });

        function calculateAge(birthdate) {
            const birth = new Date(birthdate);
            const now = new Date();
            let years = now.getFullYear() - birth.getFullYear();
            let months = now.getMonth() - birth.getMonth();
            let d = now.getDate() - birth.getDate();
            if (d < 0) { months--; d += 30; }
            if (months < 0) { years--; months += 12; }
            return { years, months, days: d };
        }

        function calculateEfficiency() {
            const currentDay = days[new Date().getDay()];
            const tasks = state.fluxTasks.filter(t => t.day === currentDay);
            const total = state.rechargeData.length + tasks.length;
            if (total === 0) return 0;
            const doneProtocols = state.rechargeData.filter(p => p.current >= p.total).length;
            const doneTasks = tasks.filter(t => state.completedIds.has(t.id)).length;
            return Math.round(((doneProtocols + doneTasks) / total) * 100);
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true }).toLowerCase();
            document.getElementById('header-day').innerText = days[now.getDay()];
            const todayStr = now.toDateString();
            if (todayStr !== state.lastResetDate) {
                state.history.unshift({ date: state.lastResetDate, efficiency: calculateEfficiency() });
                state.rechargeData.forEach(p => p.current = 0);
                state.completedIds.clear();
                state.lastResetDate = todayStr;
                render();
            }
        }

        function toggleDarkMode() {
            state.isDarkMode = !state.isDarkMode;
            document.documentElement.classList.toggle('dark', state.isDarkMode);
            document.body.classList.toggle('bg-slate-900', state.isDarkMode);
            document.body.classList.toggle('bg-[#F8FAFC]', !state.isDarkMode);
            const icon = document.getElementById('theme-icon');
            icon.setAttribute('data-lucide', state.isDarkMode ? 'sun' : 'moon');
            lucide.createIcons();
        }

        function navigateTo(viewId) {
            state.currentView = viewId;
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.replace('text-cyan-500', 'text-slate-400'));
            const activeBtn = document.getElementById('nav-' + viewId);
            if(activeBtn) activeBtn.classList.replace('text-slate-400', 'text-cyan-500');
            window.scrollTo(0, 0);
            render();
        }

        function toggleQuickMenu() {
            const menu = document.getElementById('quick-menu');
            const btn = document.getElementById('plus-btn');
            const isOpen = menu.classList.toggle('hidden');
            btn.classList.toggle('rotate-45', !isOpen);
            btn.classList.toggle('bg-red-500', !isOpen);
        }

        function handleTaskToggle(id) {
            if (state.completedIds.has(id)) state.completedIds.delete(id);
            else state.completedIds.add(id);
            render();
        }

        function handleProtocolIncrement(id) {
            const p = state.rechargeData.find(x => x.id === id);
            if (p && p.current < p.total) p.current++;
            render();
        }
        
        function removeProtocol(id, event) {
            event.stopPropagation();
            state.rechargeData = state.rechargeData.filter(p => p.id !== id);
            render();
        }

        function openModal(type, payload = null) {
            const overlay = document.getElementById('modal-overlay');
            const content = document.getElementById('modal-content');
            overlay.classList.add('active');
            
            let html = `<div class="flex justify-between items-center mb-6">
                <h3 class="text-xs font-semibold uppercase tracking-widest text-[#94A3B8]">${type.replace('_', ' ')}</h3>
                <button onclick="closeModal()" class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-700"><i data-lucide="x" size="20"></i></button>
            </div>`;

            if (type === 'add_task') {
                html += `
                    <div class="space-y-4">
                        <input id="input-task" placeholder="Objective Name" class="w-full p-4 rounded-xl border dark:bg-slate-800 dark:border-slate-700 dark:text-white">
                        <input id="input-time" value="12:00 PM" class="w-full p-4 rounded-xl border dark:bg-slate-800 dark:border-slate-700 dark:text-white">
                        <button onclick="saveTask()" class="w-full py-4 bg-slate-900 text-white dark:bg-white dark:text-slate-900 font-semibold rounded-2xl uppercase text-[10px]">Initialize Task</button>
                    </div>`;
            } else if (type === 'add_protocol') {
                html += `
                    <div class="space-y-4">
                        <input id="input-label" placeholder="Protocol Name (e.g. WATER)" class="w-full p-4 rounded-xl border dark:bg-slate-800 dark:border-slate-700 dark:text-white">
                        <div class="flex gap-2">
                            <input id="input-total" type="number" value="1" min="1" class="w-full p-4 rounded-xl border dark:bg-slate-800 dark:border-slate-700 dark:text-white">
                            <div class="flex items-center text-xs font-semibold text-slate-400 px-2">REPS</div>
                        </div>
                        <button onclick="saveProtocol()" class="w-full py-4 bg-cyan-500 text-white font-semibold rounded-2xl uppercase text-[10px] shadow-lg shadow-cyan-500/20">Apply Protocol</button>
                    </div>`;
            } else if (type === 'factory_reset') {
                html += `
                    <div class="text-center space-y-6">
                        <i data-lucide="alert-triangle" class="mx-auto text-red-500" size="48"></i>
                        <h4 class="text-xl font-semibold dark:text-white">Confirm Wipe?</h4>
                        <p class="text-xs text-slate-500">This will erase all biometric data and history logs.</p>
                        <button onclick="performReset()" class="w-full py-4 bg-red-500 text-white font-semibold rounded-2xl uppercase text-[10px]">Wipe System</button>
                    </div>`;
            } else if (type === 'edit_profile') {
                const profile = state.profiles.find(p => p.id === state.activeProfileId);
                html += `
                    <div class="space-y-4">
                        <input id="input-name" value="${profile.name}" class="w-full p-4 rounded-xl border dark:bg-slate-800 dark:border-slate-700 dark:text-white">
                        <input id="input-birth" type="date" value="${profile.birthdate}" class="w-full p-4 rounded-xl border dark:bg-slate-800 dark:border-slate-700 dark:text-white">
                        <button onclick="saveProfile()" class="w-full py-4 bg-slate-900 text-white dark:bg-white dark:text-slate-900 font-semibold rounded-2xl uppercase text-[10px]">Sync Identity</button>
                    </div>`;
            } else if (type === 'edit_blueprint') {
                const dayPlan = state.weeklyPlan[payload];
                html += `
                    <div class="space-y-4">
                        <p class="text-[10px] font-semibold text-cyan-500 uppercase tracking-widest">${payload} ARCHITECTURE</p>
                        <div><label class="text-[8px] font-semibold text-slate-400 block mb-1">BREAKFAST</label><input id="input-b" value="${dayPlan.BREAKFAST}" class="w-full p-4 rounded-xl border dark:bg-slate-800 dark:border-slate-700 dark:text-white"></div>
                        <div><label class="text-[8px] font-semibold text-slate-400 block mb-1">LUNCH</label><input id="input-l" value="${dayPlan.LUNCH}" class="w-full p-4 rounded-xl border dark:bg-slate-800 dark:border-slate-700 dark:text-white"></div>
                        <div><label class="text-[8px] font-semibold text-slate-400 block mb-1">DINNER</label><input id="input-d" value="${dayPlan.DINNER}" class="w-full p-4 rounded-xl border dark:bg-slate-800 dark:border-slate-700 dark:text-white"></div>
                        <button onclick="saveBlueprint('${payload}')" class="w-full py-4 bg-slate-900 text-white dark:bg-white dark:text-slate-900 font-semibold rounded-2xl uppercase text-[10px]">Update Blueprint</button>
                    </div>`;
            }

            content.innerHTML = html;
            lucide.createIcons();
        }

        function closeModal() { document.getElementById('modal-overlay').classList.remove('active'); }

        function saveTask() {
            const task = document.getElementById('input-task').value;
            const time = document.getElementById('input-time').value;
            if(!task) return;
            state.fluxTasks.push({ id: Date.now().toString(), task, time, day: state.selectedDay });
            closeModal();
            render();
        }

        function saveProtocol() {
            const label = document.getElementById('input-label').value;
            const total = parseInt(document.getElementById('input-total').value);
            if(!label) return;
            state.rechargeData.push({ id: Date.now().toString(), label: label.toUpperCase(), current: 0, total: total || 1, time: '09:00 AM' });
            closeModal();
            render();
        }

        function saveProfile() {
            const name = document.getElementById('input-name').value;
            const birth = document.getElementById('input-birth').value;
            const profile = state.profiles.find(p => p.id === state.activeProfileId);
            profile.name = name; profile.birthdate = birth;
            closeModal();
            render();
        }

        function saveBlueprint(day) {
            state.weeklyPlan[day].BREAKFAST = document.getElementById('input-b').value;
            state.weeklyPlan[day].LUNCH = document.getElementById('input-l').value;
            state.weeklyPlan[day].DINNER = document.getElementById('input-d').value;
            closeModal();
            render();
        }

        function performReset() { localStorage.clear(); window.location.reload(); }

        function handleAvatarUpload(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const profile = state.profiles.find(p => p.id === state.activeProfileId);
                    profile.avatar = event.target.result;
                    render();
                };
                reader.readAsDataURL(file);
            }
        }

        function render() {
            const profile = state.profiles.find(p => p.id === state.activeProfileId);
            document.getElementById('user-greeting').innerText = profile.name.split(' ')[0];
            document.getElementById('user-name-small').innerText = profile.name;
            const avatars = [document.getElementById('user-avatar-small'), document.getElementById('profile-avatar-large')];
            avatars.forEach(el => {
                if(!el) return;
                if(profile.avatar) el.innerHTML = `<img src="${profile.avatar}" class="w-full h-full object-cover">`;
                else el.innerText = profile.name[0];
            });

            if (state.currentView === 'DASHBOARD') {
                const ds = document.getElementById('day-selector');
                ds.innerHTML = days.map(d => `
                    <button onclick="state.selectedDay='${d}'; render();" class="px-6 py-3 rounded-2xl text-[10px] font-semibold uppercase tracking-widest shrink-0 border ${state.selectedDay === d ? (state.isDarkMode ? 'bg-white text-black border-white' : 'bg-slate-900 text-white border-slate-900') : (state.isDarkMode ? 'bg-slate-800 border-slate-700 text-slate-500' : 'bg-white border-slate-100 text-slate-400')}">
                        ${d.slice(0,3)}
                        ${d === days[new Date().getDay()] ? '<div class="w-1 h-1 bg-cyan-500 rounded-full mx-auto mt-1"></div>' : ''}
                    </button>
                `).join('');

                const eff = calculateEfficiency();
                document.getElementById('efficiency-value').innerText = eff + '%';
                document.getElementById('efficiency-bar').style.width = eff + '%';

                const mp = document.getElementById('mini-meal-plan');
                const dayPlan = state.weeklyPlan[state.selectedDay];
                mp.innerHTML = `
                    <div class="flex justify-between items-center text-xs"><span class="font-semibold text-slate-400">B</span><span class="font-bold dark:text-white">${dayPlan.BREAKFAST}</span></div>
                    <div class="flex justify-between items-center text-xs"><span class="font-semibold text-slate-400">L</span><span class="font-bold dark:text-white">${dayPlan.LUNCH}</span></div>
                    <div class="flex justify-between items-center text-xs"><span class="font-semibold text-slate-400">D</span><span class="font-bold dark:text-white">${dayPlan.DINNER}</span></div>
                `;

                const tl = document.getElementById('timeline-list');
                const filteredTasks = state.fluxTasks.filter(t => t.day === state.selectedDay);
                tl.innerHTML = filteredTasks.map(t => `
                    <div class="flex gap-4 group">
                        <button onclick="handleTaskToggle('${t.id}')" class="w-6 h-6 rounded-full border-2 shrink-0 transition-colors ${state.completedIds.has(t.id) ? 'bg-emerald-500 border-emerald-500 text-white' : 'border-slate-300'} flex items-center justify-center">
                            ${state.completedIds.has(t.id) ? '<i data-lucide="check" size="14"></i>' : ''}
                        </button>
                        <div class="flex-1 border-b pb-4 dark:border-slate-700 ${state.completedIds.has(t.id) ? 'opacity-40' : ''}">
                            <p class="text-[10px] font-semibold text-slate-400">${t.time}</p>
                            <p class="text-sm font-semibold dark:text-white ${state.completedIds.has(t.id) ? 'line-through' : ''}">${t.task}</p>
                        </div>
                    </div>
                `).join('');
                if(filteredTasks.length === 0) tl.innerHTML = '<p class="text-center py-8 text-slate-400 text-[10px] font-semibold uppercase tracking-widest">No tasks for today</p>';

                const pg = document.getElementById('protocol-grid');
                pg.innerHTML = state.rechargeData.map(p => `
                    <div onclick="handleProtocolIncrement('${p.id}')" class="protocol-card group relative p-6 border rounded-3xl cursor-pointer bg-[#F8FAFC] border-slate-100 dark:bg-slate-900/50 dark:border-slate-700 transition-all">
                        <button onclick="removeProtocol('${p.id}', event)" class="absolute -top-2 -right-2 w-6 h-6 rounded-full bg-red-500 text-white flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all shadow-lg">
                            <i data-lucide="x" size="12"></i>
                        </button>
                        <p class="text-[9px] font-semibold text-slate-400 uppercase tracking-widest mb-1">${p.label}</p>
                        <p class="text-xl font-bold dark:text-white">${p.current}/${p.total}</p>
                        <div class="mt-4 h-1 w-full bg-slate-200 rounded-full overflow-hidden">
                            <div class="h-full bg-cyan-500 transition-all" style="width: ${(p.current/p.total)*100}%"></div>
                        </div>
                    </div>
                `).join('');
            }

            if (state.currentView === 'WEEKLY_ARCHITECTURE') {
                const grid = document.getElementById('full-weekly-grid');
                grid.innerHTML = days.map(d => `
                    <div class="p-6 rounded-[2.5rem] border bg-white border-[#E2E8F0] dark:bg-slate-800 dark:border-slate-700 relative group">
                        <button onclick="openModal('edit_blueprint', '${d}')" class="absolute top-6 right-6 p-2 rounded-xl bg-slate-50 text-slate-400 opacity-0 group-hover:opacity-100 transition-all dark:bg-slate-700 dark:text-slate-500"><i data-lucide="edit-3" size="14"></i></button>
                        <h4 class="text-[11px] font-semibold uppercase tracking-widest text-slate-400 mb-6">${d}</h4>
                        <div class="space-y-4">
                            ${['BREAKFAST', 'LUNCH', 'DINNER'].map(m => `
                                <div><p class="text-[8px] font-semibold text-cyan-500 uppercase tracking-wider">${m}</p><p class="text-sm font-semibold dark:text-white">${state.weeklyPlan[d][m]}</p></div>
                            `).join('')}
                        </div>
                    </div>
                `).join('');
            }

            if (state.currentView === 'HISTORY') {
                const hl = document.getElementById('history-list');
                hl.innerHTML = state.history.map(h => `
                    <div class="p-6 rounded-3xl border flex items-center justify-between bg-white border-[#E2E8F0] dark:bg-slate-800 dark:border-slate-700">
                        <div><p class="text-sm font-semibold dark:text-white">${h.date}</p></div>
                        <div class="text-right"><p class="text-2xl font-black text-cyan-500">${h.efficiency}%</p></div>
                    </div>
                `).join('');
            }

            if (state.currentView === 'PROFILE') {
                const ps = document.getElementById('profile-selector-list');
                ps.innerHTML = state.profiles.map(p => `
                    <div class="flex items-center gap-4 p-4 rounded-3xl border ${state.activeProfileId === p.id ? 'bg-white border-cyan-500 dark:bg-slate-700' : 'bg-white border-slate-100 dark:bg-slate-800 dark:border-slate-700'}">
                        <div class="w-10 h-10 rounded-xl bg-slate-100 dark:bg-slate-900 flex items-center justify-center font-black">${p.name[0]}</div>
                        <div class="flex-1 truncate text-sm font-semibold dark:text-white">${p.name}</div>
                    </div>
                `).join('');
                const age = calculateAge(profile.birthdate);
                document.getElementById('profile-name-large').innerText = profile.name;
                document.getElementById('age-stats').innerHTML = `
                    <div class="px-6 py-4 rounded-3xl border bg-[#F8FAFC] dark:bg-slate-900/50 dark:border-slate-700"><p class="text-[8px] font-semibold text-slate-400 mb-1 uppercase tracking-wider">YEARS</p><p class="text-xl font-bold dark:text-white">${age.years}</p></div>
                    <div class="px-6 py-4 rounded-3xl border bg-[#F8FAFC] dark:bg-slate-900/50 dark:border-slate-700"><p class="text-[8px] font-semibold text-slate-400 mb-1 uppercase tracking-wider">MONTHS</p><p class="text-xl font-bold dark:text-white">${age.months}</p></div>
                `;
            }
            lucide.createIcons();
        }

        window.onload = () => {
            const saved = localStorage.getItem('lifeflux_state_v2');
            if (saved) {
                const parsed = JSON.parse(saved);
                state = { ...state, ...parsed };
                state.completedIds = new Set(parsed.completedIds || []);
            }
            setInterval(updateClock, 1000);
            updateClock();
            render();
            setInterval(() => {
                const toSave = { ...state, completedIds: Array.from(state.completedIds) };
                localStorage.setItem('lifeflux_state_v2', JSON.stringify(toSave));
            }, 5000);
        };
    </script>
</body>
</html>
