<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeFlux Web</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=JetBrains+Mono:wght@500&display=swap');

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --accent-color: #6366f1; 
            --card-bg: #ffffff;
        }

        .dark {
            --bg-primary: #000000;
            --bg-secondary: #0a0a0a;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --border-color: #1e293b;
            --accent-color: #D9F99D; 
            --card-bg: #111111;
        }

        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
            background-color: var(--bg-primary);
            color: var(--text-muted);
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .text-main { color: var(--text-main) !important; }
        .bg-card { background-color: var(--card-bg) !important; }
        .bg-secondary { background-color: var(--bg-secondary) !important; }
        .border-main { border-color: var(--border-color) !important; }
        .accent-text { color: var(--accent-color) !important; }
        .accent-bg { background-color: var(--accent-color) !important; }

        .font-mono { font-family: 'JetBrains Mono', monospace; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .page {
            display: none;
            animation: fadeIn 0.3s ease-out forwards;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .protocol-card:active { transform: scale(0.97); }
        
        #modal-overlay {
            display: none;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            z-index: 100;
        }
        
        .dark #modal-overlay {
            background: rgba(0, 0, 0, 0.85);
        }
        
        #modal-overlay.active {
            display: flex;
        }

        /* Splash Welcome Screen */
        #splash-screen {
            position: fixed;
            inset: 0;
            background: var(--bg-primary);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1.2s ease, visibility 1.2s;
        }

        ::selection {
            background: var(--accent-color);
            color: #000;
        }
    </style>
</head>
<body class="pb-48">

    <!-- SPLASH SCREEN -->
    <div id="splash-screen">
        <h1 id="splash-greeting" class="text-4xl sm:text-6xl font-light tracking-tighter text-main uppercase mb-2">
            Hi! <span id="splash-user-name" class="font-black">User</span>
        </h1>
        <p class="text-xs font-bold tracking-[0.6em] accent-text uppercase animate-pulse">Flow Without Limits</p>
    </div>

    <!-- MODAL SYSTEM -->
    <div id="modal-overlay" class="fixed inset-0 items-center justify-center p-4">
        <div id="modal-content" class="bg-card rounded-[2.5rem] w-full max-w-md p-8 shadow-2xl border border-main">
            <!-- Content injected via JS -->
        </div>
    </div>

    <!-- HEADER -->
    <header class="max-w-6xl mx-auto px-6 pt-12 pb-8 flex justify-between items-start">
        <div class="cursor-pointer" onclick="navigateTo('DASHBOARD')">
            <h1 class="text-2xl font-black tracking-tighter text-main uppercase">Life<span class="accent-text">Flux</span></h1>
            <p class="text-[9px] font-bold tracking-[0.3em] mt-1 text-muted uppercase">Flow Without Limits</p>
            <p class="text-[10px] font-bold tracking-[0.4em] mt-0.5 text-muted uppercase"><span id="header-day" class="text-main">MONDAY</span></p>
        </div>
        <div class="flex items-center gap-4">
            <!-- THEME TOGGLE -->
            <button onclick="toggleTheme()" class="p-3 rounded-2xl border border-main bg-card text-main hover:scale-105 transition-transform flex items-center justify-center">
                <i data-lucide="sun" id="theme-icon-sun" class="hidden" size="20"></i>
                <i data-lucide="moon" id="theme-icon-moon" size="20"></i>
            </button>

            <div class="px-4 py-2 rounded-2xl border bg-card border-main flex items-center gap-3">
                <div id="user-avatar-small" class="w-8 h-8 rounded-lg overflow-hidden accent-bg text-black flex items-center justify-center text-[10px] font-black italic">U</div>
                <span id="user-name-small" class="text-[10px] font-bold uppercase tracking-widest truncate max-w-[80px] text-main">User Alpha</span>
            </div>
            <p id="clock" class="text-2xl font-mono font-bold tracking-tighter hidden sm:block accent-text">12:00 pm</p>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 space-y-8">
        
        <!-- PAGE: DASHBOARD -->
        <div id="DASHBOARD" class="page active">
            <div class="flex items-center gap-3 mb-8">
                <div class="p-2 rounded-xl bg-indigo-500/10 dark:bg-[#D9F99D]/10 accent-text"><i data-lucide="zap" size="20"></i></div>
                <h2 class="text-2xl font-bold tracking-tight text-main">Greetings, <span id="user-greeting" class="accent-text">User</span></h2>
            </div>

            <!-- Day Selector -->
            <div class="flex gap-2 overflow-x-auto pb-4 no-scrollbar mb-8" id="day-selector"></div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <section class="md:col-span-2 rounded-[2rem] border p-8 shadow-sm flex items-center justify-between bg-card border-main">
                    <div class="flex-1">
                        <h2 class="text-[11px] font-bold uppercase tracking-[0.2em] text-muted mb-4">Core Efficiency</h2>
                        <span id="efficiency-value" class="text-5xl font-black tracking-tighter text-main">0%</span>
                        <div class="h-2 w-full mt-6 rounded-full overflow-hidden bg-slate-100 dark:bg-slate-900">
                            <div id="efficiency-bar" class="h-full accent-bg transition-all duration-1000" style="width: 0%"></div>
                        </div>
                    </div>
                </section>
                
                <section class="rounded-[2rem] border p-8 bg-card border-main">
                   <div class="flex justify-between items-center mb-6">
                     <h3 id="blueprint-title" class="text-[11px] font-bold uppercase tracking-widest text-muted">Nutrition Sync</h3>
                     <button onclick="openModal('edit_blueprint', state.selectedDay)" class="p-1 text-muted hover:accent-text transition-colors"><i data-lucide="edit-3" size="14"></i></button>
                   </div>
                   <div class="space-y-4" id="mini-meal-plan"></div>
                </section>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <section class="rounded-[2.5rem] border p-8 bg-card border-main">
                    <div class="flex items-center justify-between mb-8">
                        <h3 class="text-[11px] font-bold uppercase tracking-widest text-muted">Daily Objectives</h3>
                        <button onclick="openModal('add_task')" class="p-2 rounded-xl bg-secondary border border-main text-muted hover:accent-text transition-colors"><i data-lucide="plus" size="18"></i></button>
                    </div>
                    <div class="space-y-6" id="timeline-list"></div>
                </section>

                <section class="rounded-[2.5rem] border p-8 bg-card border-main">
                    <div class="flex items-center justify-between mb-8">
                        <h3 class="text-[11px] font-bold uppercase tracking-widest text-muted">Protocol Check</h3>
                        <button onclick="openModal('add_protocol')" class="p-2 rounded-xl bg-secondary border border-main text-muted hover:accent-text transition-colors"><i data-lucide="plus" size="18"></i></button>
                    </div>
                    <div class="grid grid-cols-2 gap-4" id="protocol-grid"></div>
                </section>
            </div>
        </div>

        <!-- PAGE: WEEKLY -->
        <div id="WEEKLY_ARCHITECTURE" class="page">
            <div class="flex items-center gap-4 mb-8">
                <button onclick="navigateTo('DASHBOARD')" class="p-3 border rounded-2xl bg-card border-main text-main flex items-center justify-center"><i data-lucide="chevron-left" size="20"></i></button>
                <h2 class="text-xl font-bold text-main">Architecture Plan</h2>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="full-weekly-grid"></div>
        </div>

        <!-- PAGE: HISTORY -->
        <div id="HISTORY" class="page max-w-3xl mx-auto">
            <div class="flex items-center gap-4 mb-8">
                <button onclick="navigateTo('DASHBOARD')" class="p-3 border rounded-2xl bg-card border-main text-main flex items-center justify-center"><i data-lucide="chevron-left" size="20"></i></button>
                <h2 class="text-xl font-bold text-main">System Logs</h2>
            </div>
            <div class="space-y-4" id="history-list"></div>
        </div>

        <!-- PAGE: PROFILE -->
        <div id="PROFILE" class="page max-w-4xl mx-auto">
            <div class="flex items-center justify-between mb-8">
                <div class="flex items-center gap-4">
                    <button onclick="navigateTo('DASHBOARD')" class="p-3 border rounded-2xl bg-card border-main text-main flex items-center justify-center"><i data-lucide="chevron-left" size="20"></i></button>
                    <h2 class="text-xl font-bold text-main">Settings</h2>
                </div>
                <button onclick="openModal('add_profile')" class="px-6 py-3 rounded-2xl accent-bg text-black font-bold text-[10px] uppercase tracking-widest flex items-center gap-2 transition-opacity hover:opacity-90"><i data-lucide="user-plus" size="16"></i> New Profile</button>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-1 space-y-4">
                    <h3 class="text-[11px] font-bold text-muted uppercase tracking-widest px-4">Active Profiles</h3>
                    <div id="profile-selector-list" class="space-y-3"></div>
                </div>

                <div id="profile-details-panel" class="lg:col-span-2 rounded-[2.5rem] border p-10 bg-card border-main relative shadow-sm">
                    <button onclick="openModal('edit_profile')" class="absolute top-8 right-8 p-3 rounded-2xl bg-secondary border border-main text-muted hover:accent-text transition-colors flex items-center justify-center"><i data-lucide="pencil" size="14"></i></button>
                    <div class="text-center">
                        <div class="relative inline-block">
                            <div id="profile-avatar-large" class="w-32 h-32 rounded-[2.5rem] overflow-hidden bg-secondary border border-main mx-auto mb-4 flex items-center justify-center text-main font-black text-4xl">U</div>
                            <input type="file" id="avatar-input" class="hidden" accept="image/*" onchange="handleAvatarUpload(event)">
                            <button onclick="document.getElementById('avatar-input').click()" class="absolute bottom-2 right-0 p-3 rounded-2xl accent-bg text-black shadow-lg hover:scale-110 transition-transform flex items-center justify-center"><i data-lucide="camera" size="18"></i></button>
                        </div>
                        <h3 id="profile-name-large" class="text-3xl font-bold text-main">User Alpha</h3>
                        <div class="mt-6 flex flex-wrap justify-center gap-4" id="age-stats"></div>
                    </div>
                    <div class="pt-8 mt-8 border-t border-dashed border-main flex flex-col gap-3">
                        <button onclick="deleteActiveProfile()" id="delete-profile-btn" class="w-full py-4 rounded-2xl border border-red-500/20 text-red-500 font-bold text-[11px] uppercase tracking-widest hover:bg-red-500/5 transition-colors hidden">Delete Profile</button>
                        <button onclick="openModal('factory_reset')" class="w-full py-4 rounded-2xl border border-main text-muted font-bold text-[11px] uppercase tracking-widest hover:bg-slate-500/5 transition-colors">Full System Reset</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- CREDITS FOOTER -->
        <footer class="pt-12 pb-24 text-center opacity-40">
            <p class="text-[9px] font-bold uppercase tracking-[0.5em] text-muted">Architected by <span class="text-main">JWAL V. PATEL</span></p>
        </footer>

    </main>

    <!-- NAVIGATION BAR -->
    <nav class="fixed bottom-10 left-1/2 -translate-x-1/2 w-[90%] max-w-md z-[60]">
        <div id="quick-menu" class="hidden absolute bottom-24 left-1/2 -translate-x-1/2 w-48 space-y-2">
            <button onclick="openModal('add_protocol')" class="w-full p-4 rounded-2xl border bg-card border-main text-main flex items-center gap-3 shadow-2xl">
                <div class="w-8 h-8 rounded-lg bg-indigo-500/10 dark:bg-[#D9F99D]/10 accent-text flex items-center justify-center"><i data-lucide="activity" size="18"></i></div>
                <span class="text-[10px] font-bold uppercase tracking-widest">Protocol</span>
            </button>
            <button onclick="openModal('add_task')" class="w-full p-4 rounded-2xl border bg-card border-main text-main flex items-center gap-3 shadow-2xl">
                <div class="w-8 h-8 rounded-lg bg-blue-500/10 text-blue-500 flex items-center justify-center"><i data-lucide="clipboard-list" size="18"></i></div>
                <span class="text-[10px] font-bold uppercase tracking-widest">Objective</span>
            </button>
        </div>

        <div class="border rounded-[2rem] shadow-2xl p-2 flex items-center justify-around backdrop-blur-2xl bg-card/80 border-main">
            <button onclick="navigateTo('DASHBOARD')" class="nav-btn p-4 rounded-2xl text-muted transition-colors" id="nav-DASHBOARD"><i data-lucide="zap" size="20"></i></button>
            <button onclick="navigateTo('HISTORY')" class="nav-btn p-4 rounded-2xl text-muted transition-colors" id="nav-HISTORY"><i data-lucide="history" size="20"></i></button>
            <button onclick="toggleQuickMenu()" id="plus-btn" class="w-12 h-12 rounded-full flex items-center justify-center accent-bg text-black transform transition active:scale-90 shadow-lg"><i data-lucide="plus" size="24"></i></button>
            <button onclick="navigateTo('WEEKLY_ARCHITECTURE')" class="nav-btn p-4 rounded-2xl text-muted transition-colors" id="nav-WEEKLY_ARCHITECTURE"><i data-lucide="layout-grid" size="20"></i></button>
            <button onclick="navigateTo('PROFILE')" class="nav-btn p-4 rounded-2xl text-muted transition-colors" id="nav-PROFILE"><i data-lucide="settings" size="20"></i></button>
        </div>
    </nav>

    <script>
        const days = ["SUNDAY", "MONDAY", "TUESDAY", "WEDNESDAY", "THURSDAY", "FRIDAY", "SATURDAY"];
        let state = {
            theme: 'dark',
            currentView: 'DASHBOARD',
            selectedDay: days[new Date().getDay()],
            lastResetDate: new Date().toDateString(),
            completedIds: new Set(),
            activeProfileId: 'default',
            profiles: [{ id: 'default', name: "User Alpha", birthdate: "2000-01-01", avatar: null }],
            history: [],
            rechargeData: [
                { id: 'hydration', label: 'HYDRATION', current: 0, total: 8, time: '08:00 AM' },
                { id: 'meditation', label: 'MEDITATION', current: 0, total: 1, time: '07:00 AM' },
                { id: 'reading', label: 'READING', current: 0, total: 1, time: '09:00 PM' }
            ],
            fluxTasks: [],
            weeklyPlan: {}
        };

        days.forEach(day => {
            state.weeklyPlan[day] = {
                BREAKFAST: 'Nutrient Shake', LUNCH: 'Power Salad', DINNER: 'Lean Protein',
                B_TIME: '08:00 AM', L_TIME: '01:00 PM', D_TIME: '07:00 PM'
            };
        });

        function toggleTheme() {
            state.theme = state.theme === 'dark' ? 'light' : 'dark';
            applyTheme();
        }

        function applyTheme() {
            const html = document.documentElement;
            const sunIcon = document.getElementById('theme-icon-sun');
            const moonIcon = document.getElementById('theme-icon-moon');
            
            if (state.theme === 'dark') {
                html.classList.add('dark');
                sunIcon.classList.add('hidden');
                moonIcon.classList.remove('hidden');
            } else {
                html.classList.remove('dark');
                sunIcon.classList.remove('hidden');
                moonIcon.classList.add('hidden');
            }
            render();
        }

        function calculateAge(birthdate) {
            const birth = new Date(birthdate);
            const now = new Date();
            let years = now.getFullYear() - birth.getFullYear();
            let months = now.getMonth() - birth.getMonth();
            let d = now.getDate() - birth.getDate();
            if (d < 0) { months--; d += 30; }
            if (months < 0) { years--; months += 12; }
            return { years, months, days: d };
        }

        function calculateEfficiency() {
            const currentDay = days[new Date().getDay()];
            const tasks = state.fluxTasks.filter(t => t.day === currentDay);
            const total = state.rechargeData.length + tasks.length;
            if (total === 0) return 0;
            const doneProtocols = state.rechargeData.filter(p => p.current >= p.total).length;
            const doneTasks = tasks.filter(t => state.completedIds.has(t.id)).length;
            return Math.round(((doneProtocols + doneTasks) / total) * 100);
        }

        function updateClock() {
            const now = new Date();
            const clockEl = document.getElementById('clock');
            if(clockEl) clockEl.innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true }).toLowerCase();
            
            const headerDayEl = document.getElementById('header-day');
            if(headerDayEl) headerDayEl.innerText = days[now.getDay()];
            
            const todayStr = now.toDateString();
            if (todayStr !== state.lastResetDate) {
                state.history.unshift({ date: state.lastResetDate, efficiency: calculateEfficiency() });
                state.rechargeData.forEach(p => p.current = 0);
                state.completedIds.clear();
                state.lastResetDate = todayStr;
                render();
            }
        }

        function navigateTo(viewId) {
            state.currentView = viewId;
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            window.scrollTo(0, 0);
            render();
        }

        function toggleQuickMenu() {
            const menu = document.getElementById('quick-menu');
            const btn = document.getElementById('plus-btn');
            const isOpen = menu.classList.toggle('hidden');
            btn.classList.toggle('rotate-45', !isOpen);
            if (!isOpen) {
               btn.classList.remove('accent-bg');
               btn.classList.add('bg-red-500');
            } else {
               btn.classList.add('accent-bg');
               btn.classList.remove('bg-red-500');
            }
        }

        function handleTaskToggle(id) {
            if (state.completedIds.has(id)) state.completedIds.delete(id);
            else state.completedIds.add(id);
            render();
        }

        function handleProtocolIncrement(id) {
            const p = state.rechargeData.find(x => x.id === id);
            if (p && p.current < p.total) p.current++;
            render();
        }
        
        function removeProtocol(id, event) {
            event.stopPropagation();
            state.rechargeData = state.rechargeData.filter(p => p.id !== id);
            render();
        }

        function switchProfile(profileId) {
            state.activeProfileId = profileId;
            render();
        }

        function deleteActiveProfile() {
            if (state.profiles.length <= 1) return;
            state.profiles = state.profiles.filter(p => p.id !== state.activeProfileId);
            state.activeProfileId = state.profiles[0].id;
            render();
        }

        function openModal(type, payload = null) {
            const overlay = document.getElementById('modal-overlay');
            const content = document.getElementById('modal-content');
            overlay.classList.add('active');
            
            let html = `<div class="flex justify-between items-center mb-6">
                <h3 class="text-[10px] font-bold uppercase tracking-widest text-muted">${type.replace('_', ' ')}</h3>
                <button onclick="closeModal()" class="p-2 rounded-full hover:bg-black/5 dark:hover:bg-white/5 text-muted flex items-center justify-center"><i data-lucide="x" size="20"></i></button>
            </div>`;

            const inputStyle = "w-full p-4 rounded-xl border bg-secondary border-main text-main focus:outline-none focus:ring-1 focus:ring-indigo-500 dark:focus:ring-[#D9F99D] transition-all placeholder:text-muted/50";
            const btnPrimary = "w-full py-4 accent-bg text-black font-bold rounded-xl uppercase text-[10px] tracking-widest hover:opacity-90 transition-opacity";

            if (type === 'add_task') {
                html += `
                    <div class="space-y-4">
                        <input id="input-task" placeholder="Objective Name" class="${inputStyle}">
                        <div class="flex gap-2">
                            <input id="input-time-raw" placeholder="12:00" class="${inputStyle} flex-1">
                            <div class="flex border border-main rounded-xl overflow-hidden bg-secondary">
                                <button id="am-toggle" onclick="setAMPM('AM')" class="px-4 py-2 text-[10px] font-black tracking-widest accent-bg text-black transition-all">AM</button>
                                <button id="pm-toggle" onclick="setAMPM('PM')" class="px-4 py-2 text-[10px] font-black tracking-widest text-muted transition-all">PM</button>
                            </div>
                        </div>
                        <input type="hidden" id="selected-ampm" value="AM">
                        <button onclick="saveTask()" class="${btnPrimary}">Initialize</button>
                    </div>`;
            } else if (type === 'add_protocol') {
                html += `
                    <div class="space-y-4">
                        <input id="input-label" placeholder="Protocol Name" class="${inputStyle}">
                        <div class="flex gap-2">
                            <input id="input-total" type="number" value="1" min="1" class="${inputStyle}">
                            <div class="flex items-center text-[10px] font-bold text-muted px-2 uppercase tracking-widest">Sets</div>
                        </div>
                        <button onclick="saveProtocol()" class="${btnPrimary}">Apply</button>
                    </div>`;
            } else if (type === 'factory_reset') {
                html += `
                    <div class="text-center space-y-6">
                        <i data-lucide="alert-octagon" class="mx-auto text-red-500" size="40"></i>
                        <h4 class="text-xl font-bold text-main">System Wipe</h4>
                        <p class="text-xs text-muted">All local data will be permanently cleared from this device.</p>
                        <button onclick="performReset()" class="w-full py-4 bg-red-600 text-white font-bold rounded-xl uppercase text-[10px] tracking-widest">Execute</button>
                    </div>`;
            } else if (type === 'edit_profile') {
                const profile = state.profiles.find(p => p.id === state.activeProfileId);
                html += `
                    <div class="space-y-4">
                        <input id="input-name" value="${profile.name}" class="${inputStyle}">
                        <input id="input-birth" type="date" value="${profile.birthdate}" class="${inputStyle}">
                        <button onclick="saveProfile()" class="${btnPrimary}">Sync</button>
                    </div>`;
            } else if (type === 'add_profile') {
                html += `
                    <div class="space-y-4">
                        <input id="new-profile-name" placeholder="New User Name" class="${inputStyle}">
                        <input id="new-profile-birth" type="date" value="2000-01-01" class="${inputStyle}">
                        <button onclick="saveNewProfile()" class="${btnPrimary}">Generate Profile</button>
                    </div>`;
            } else if (type === 'edit_blueprint') {
                const dayPlan = state.weeklyPlan[payload];
                html += `
                    <div class="space-y-4">
                        <p class="text-[10px] font-bold accent-text uppercase tracking-widest">${payload} Architecture</p>
                        <div><label class="text-[9px] font-bold text-muted block mb-1 uppercase">Breakfast</label><input id="input-b" value="${dayPlan.BREAKFAST}" class="${inputStyle}"></div>
                        <div><label class="text-[9px] font-bold text-muted block mb-1 uppercase">Lunch</label><input id="input-l" value="${dayPlan.LUNCH}" class="${inputStyle}"></div>
                        <div><label class="text-[9px] font-bold text-muted block mb-1 uppercase">Dinner</label><input id="input-d" value="${dayPlan.DINNER}" class="${inputStyle}"></div>
                        <button onclick="saveBlueprint('${payload}')" class="${btnPrimary}">Update</button>
                    </div>`;
            }

            content.innerHTML = html;
            lucide.createIcons();
        }

        // New Helper for AM/PM toggling
        function setAMPM(val) {
            const amBtn = document.getElementById('am-toggle');
            const pmBtn = document.getElementById('pm-toggle');
            const hidden = document.getElementById('selected-ampm');
            
            hidden.value = val;
            if (val === 'AM') {
                amBtn.className = "px-4 py-2 text-[10px] font-black tracking-widest accent-bg text-black transition-all";
                pmBtn.className = "px-4 py-2 text-[10px] font-black tracking-widest text-muted transition-all";
            } else {
                pmBtn.className = "px-4 py-2 text-[10px] font-black tracking-widest accent-bg text-black transition-all";
                amBtn.className = "px-4 py-2 text-[10px] font-black tracking-widest text-muted transition-all";
            }
        }

        function closeModal() { document.getElementById('modal-overlay').classList.remove('active'); }

        function saveTask() {
            const task = document.getElementById('input-task').value;
            const timeRaw = document.getElementById('input-time-raw').value;
            const ampm = document.getElementById('selected-ampm').value;
            
            if(!task) return;
            
            // Format time with AM/PM
            const time = `${timeRaw || '12:00'} ${ampm}`;
            
            state.fluxTasks.push({ id: Date.now().toString(), task, time, day: state.selectedDay });
            closeModal();
            render();
        }

        function saveProtocol() {
            const label = document.getElementById('input-label').value;
            const total = parseInt(document.getElementById('input-total').value);
            if(!label) return;
            state.rechargeData.push({ id: Date.now().toString(), label: label.toUpperCase(), current: 0, total: total || 1, time: '09:00 AM' });
            closeModal();
            render();
        }

        function saveProfile() {
            const name = document.getElementById('input-name').value;
            const birth = document.getElementById('input-birth').value;
            const profile = state.profiles.find(p => p.id === state.activeProfileId);
            profile.name = name; profile.birthdate = birth;
            closeModal();
            render();
        }

        function saveNewProfile() {
            const name = document.getElementById('new-profile-name').value;
            const birth = document.getElementById('new-profile-birth').value;
            if(!name) return;
            const id = 'p-' + Date.now();
            state.profiles.push({ id, name, birthdate: birth, avatar: null });
            state.activeProfileId = id;
            closeModal();
            render();
        }

        function saveBlueprint(day) {
            state.weeklyPlan[day].BREAKFAST = document.getElementById('input-b').value;
            state.weeklyPlan[day].LUNCH = document.getElementById('input-l').value;
            state.weeklyPlan[day].DINNER = document.getElementById('input-d').value;
            closeModal();
            render();
        }

        function performReset() { localStorage.clear(); window.location.reload(); }

        function handleAvatarUpload(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const profile = state.profiles.find(p => p.id === state.activeProfileId);
                    profile.avatar = event.target.result;
                    render();
                };
                reader.readAsDataURL(file);
            }
        }

        function render() {
            const profile = state.profiles.find(p => p.id === state.activeProfileId) || state.profiles[0];
            
            // Update UI elements dependent on active profile
            const userGreetingEl = document.getElementById('user-greeting');
            if(userGreetingEl) userGreetingEl.innerText = profile.name.split(' ')[0];
            
            const userNameSmallEl = document.getElementById('user-name-small');
            if(userNameSmallEl) userNameSmallEl.innerText = profile.name;
            
            const avatarSmallEl = document.getElementById('user-avatar-small');
            if(avatarSmallEl) {
                if(profile.avatar) avatarSmallEl.innerHTML = `<img src="${profile.avatar}" class="w-full h-full object-cover">`;
                else avatarSmallEl.innerText = profile.name[0];
            }

            // Navigation state
            document.querySelectorAll('.nav-btn').forEach(btn => {
                const id = btn.id.replace('nav-', '');
                btn.classList.toggle('accent-text', state.currentView === id);
                btn.classList.toggle('text-muted', state.currentView !== id);
            });

            if (state.currentView === 'DASHBOARD') {
                const ds = document.getElementById('day-selector');
                if(ds) ds.innerHTML = days.map(d => `
                    <button onclick="state.selectedDay='${d}'; render();" class="px-5 py-3 rounded-xl text-[9px] font-bold uppercase tracking-widest shrink-0 border transition-all ${state.selectedDay === d ? 'accent-bg text-black border-transparent' : 'bg-card border-main text-muted'}">
                        ${d.slice(0,3)}
                        ${d === days[new Date().getDay()] ? `<div class="w-1 h-1 bg-black/50 dark:bg-black/30 rounded-full mx-auto mt-1"></div>` : ''}
                    </button>
                `).join('');

                const eff = calculateEfficiency();
                const effValueEl = document.getElementById('efficiency-value');
                const effBarEl = document.getElementById('efficiency-bar');
                if(effValueEl) effValueEl.innerText = eff + '%';
                if(effBarEl) effBarEl.style.width = eff + '%';

                const mp = document.getElementById('mini-meal-plan');
                const dayPlan = state.weeklyPlan[state.selectedDay];
                if(mp) mp.innerHTML = `
                    <div class="flex justify-between items-center text-xs"><span class="font-bold text-muted uppercase tracking-widest text-[9px]">Breakfast</span><span class="font-bold text-main truncate max-w-[120px]">${dayPlan.BREAKFAST}</span></div>
                    <div class="flex justify-between items-center text-xs"><span class="font-bold text-muted uppercase tracking-widest text-[9px]">Lunch</span><span class="font-bold text-main truncate max-w-[120px]">${dayPlan.LUNCH}</span></div>
                    <div class="flex justify-between items-center text-xs"><span class="font-bold text-muted uppercase tracking-widest text-[9px]">Dinner</span><span class="font-bold text-main truncate max-w-[120px]">${dayPlan.DINNER}</span></div>
                `;

                const tl = document.getElementById('timeline-list');
                const filteredTasks = state.fluxTasks.filter(t => t.day === state.selectedDay);
                if(tl) {
                    tl.innerHTML = filteredTasks.map(t => `
                        <div class="flex gap-4 group">
                            <button onclick="handleTaskToggle('${t.id}')" class="w-5 h-5 rounded-md border shrink-0 transition-all ${state.completedIds.has(t.id) ? 'accent-bg border-transparent text-black' : 'border-main bg-secondary'} flex items-center justify-center">
                                ${state.completedIds.has(t.id) ? '<i data-lucide="check" size="12"></i>' : ''}
                            </button>
                            <div class="flex-1 border-b pb-4 border-main ${state.completedIds.has(t.id) ? 'opacity-30' : ''}">
                                <p class="text-[9px] font-bold text-muted uppercase tracking-widest">${t.time}</p>
                                <p class="text-sm font-bold text-main ${state.completedIds.has(t.id) ? 'line-through' : ''}">${t.task}</p>
                            </div>
                        </div>
                    `).join('');
                    if(filteredTasks.length === 0) tl.innerHTML = '<div class="text-center py-12"><p class="text-muted/40 text-[10px] font-bold uppercase tracking-[0.2em]">Idle Phase</p></div>';
                }

                const pg = document.getElementById('protocol-grid');
                if(pg) pg.innerHTML = state.rechargeData.map(p => `
                    <div onclick="handleProtocolIncrement('${p.id}')" class="protocol-card group relative p-6 border rounded-3xl cursor-pointer bg-card border-main transition-all hover:border-slate-400 dark:hover:border-slate-700 shadow-sm">
                        <button onclick="removeProtocol('${p.id}', event)" class="absolute -top-1 -right-1 w-5 h-5 rounded-full bg-red-500 text-white flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all z-10 flex items-center justify-center">
                            <i data-lucide="x" size="10"></i>
                        </button>
                        <p class="text-[8px] font-bold text-muted uppercase tracking-widest mb-1">${p.label}</p>
                        <p class="text-2xl font-black text-main">${p.current}/${p.total}</p>
                        <div class="mt-4 h-1.5 w-full bg-secondary rounded-full overflow-hidden">
                            <div class="h-full accent-bg transition-all" style="width: ${(p.current/p.total)*100}%"></div>
                        </div>
                    </div>
                `).join('');
            }

            if (state.currentView === 'WEEKLY_ARCHITECTURE') {
                const grid = document.getElementById('full-weekly-grid');
                if(grid) grid.innerHTML = days.map(d => `
                    <div class="p-8 rounded-[2.5rem] border bg-card border-main relative group shadow-sm">
                        <button onclick="openModal('edit_blueprint', '${d}')" class="absolute top-6 right-6 p-2 rounded-xl bg-secondary border border-main text-muted opacity-0 group-hover:opacity-100 transition-all flex items-center justify-center"><i data-lucide="edit-3" size="14"></i></button>
                        <h4 class="text-[10px] font-bold uppercase tracking-widest text-muted mb-8 border-b border-main pb-2">${d}</h4>
                        <div class="space-y-5">
                            ${['BREAKFAST', 'LUNCH', 'DINNER'].map(m => `
                                <div><p class="text-[8px] font-bold accent-text uppercase tracking-widest mb-1">${m}</p><p class="text-sm font-bold text-main truncate">${state.weeklyPlan[d][m]}</p></div>
                            `).join('')}
                        </div>
                    </div>
                `).join('');
            }

            if (state.currentView === 'HISTORY') {
                const hl = document.getElementById('history-list');
                if(hl) {
                    hl.innerHTML = state.history.map(h => `
                        <div class="p-6 rounded-3xl border flex items-center justify-between bg-card border-main shadow-sm">
                            <div><p class="text-sm font-bold text-main uppercase tracking-wider">${h.date.split(' ').slice(1,3).join(' ')}</p></div>
                            <div class="text-right"><p class="text-2xl font-black accent-text">${h.efficiency}%</p></div>
                        </div>
                    `).join('');
                    if(state.history.length === 0) hl.innerHTML = '<div class="text-center py-20"><p class="text-muted/30 text-xs font-bold uppercase tracking-[0.3em]">No archive records</p></div>';
                }
            }

            if (state.currentView === 'PROFILE') {
                const ps = document.getElementById('profile-selector-list');
                if(ps) ps.innerHTML = state.profiles.map(p => `
                    <div onclick="switchProfile('${p.id}')" class="flex items-center gap-4 p-5 rounded-3xl border transition-all cursor-pointer ${state.activeProfileId === p.id ? 'bg-card border-indigo-500 dark:border-[#D9F99D] shadow-md' : 'bg-card border-main opacity-60 hover:opacity-100'}">
                        <div class="w-10 h-10 rounded-xl bg-secondary flex items-center justify-center font-black text-[10px] accent-text border border-main overflow-hidden">
                            ${p.avatar ? `<img src="${p.avatar}" class="w-full h-full object-cover">` : p.name[0]}
                        </div>
                        <div class="flex-1 truncate text-xs font-bold text-main uppercase tracking-widest">${p.name}</div>
                        ${state.activeProfileId === p.id ? '<i data-lucide="check-circle-2" class="accent-text" size="16"></i>' : ''}
                    </div>
                `).join('');

                const age = calculateAge(profile.birthdate);
                const profNameLarge = document.getElementById('profile-name-large');
                if(profNameLarge) profNameLarge.innerText = profile.name;
                
                const ageStatsEl = document.getElementById('age-stats');
                if(ageStatsEl) ageStatsEl.innerHTML = `
                    <div class="px-8 py-5 rounded-2xl border bg-card border-main shadow-sm"><p class="text-[8px] font-bold text-muted mb-1 uppercase tracking-widest">Years</p><p class="text-2xl font-black text-main">${age.years}</p></div>
                    <div class="px-8 py-5 rounded-2xl border bg-card border-main shadow-sm"><p class="text-[8px] font-bold text-muted mb-1 uppercase tracking-widest">Months</p><p class="text-2xl font-black text-main">${age.months}</p></div>
                `;

                const avatarLargeEl = document.getElementById('profile-avatar-large');
                if(avatarLargeEl) {
                    if(profile.avatar) avatarLargeEl.innerHTML = `<img src="${profile.avatar}" class="w-full h-full object-cover">`;
                    else avatarLargeEl.innerText = profile.name[0];
                }

                const deleteBtn = document.getElementById('delete-profile-btn');
                if(deleteBtn) {
                    if(state.profiles.length > 1) deleteBtn.classList.remove('hidden');
                    else deleteBtn.classList.add('hidden');
                }
            }
            lucide.createIcons();
        }

        window.onload = () => {
            const saved = localStorage.getItem('lifeflux_state_v2');
            if (saved) {
                const parsed = JSON.parse(saved);
                state = { ...state, ...parsed };
                state.completedIds = new Set(parsed.completedIds || []);
            }
            
            applyTheme();
            setInterval(updateClock, 1000);
            updateClock();
            render();

            // Splash Screen Logic
            const activeProfile = state.profiles.find(p => p.id === state.activeProfileId) || state.profiles[0];
            const splashUserEl = document.getElementById('splash-user-name');
            const splashScreen = document.getElementById('splash-screen');
            if (splashUserEl) splashUserEl.innerText = activeProfile.name;
            
            setTimeout(() => {
                if (splashScreen) {
                    splashScreen.style.opacity = '0';
                    setTimeout(() => splashScreen.style.visibility = 'hidden', 1200);
                }
            }, 4000); 
            
            setInterval(() => {
                const toSave = { ...state, completedIds: Array.from(state.completedIds) };
                localStorage.setItem('lifeflux_state_v2', JSON.stringify(toSave));
            }, 5000);
        };
    </script>
</body>
</html>
